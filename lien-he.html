<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Góc Phân Tích</title>
    <style>
        /* CSS dùng chung để đồng bộ với Trang chủ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f6f9;
            color: #333;
        }

        header {
            background-color: #1a252f;
            color: #ffffff;
            padding: 2rem 0;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 2.5rem; }
        
        /* Thanh điều hướng (Menu) mới được thêm vào */
        nav {
            margin-top: 15px;
        }
        nav a {
            color: #3498db;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        nav a:hover { color: #ffffff; }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .contact-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* Mã trang trí cho Form nhập liệu */
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Giúp khung nhập liệu không bị tràn ra ngoài */
            font-family: inherit;
        }
        .submit-btn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        .submit-btn:hover { background-color: #2980b9; }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #1a252f;
            color: #ffffff;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Liên hệ với tôi</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="lien-he.html">Liên hệ</a>
        </nav>
    </header>

    <div class="container">
        <div class="contact-box">
            <h2>Gửi tin nhắn hoặc hợp tác</h2>
            <p>Nếu bạn có thắc mắc về các bài phân tích hoặc muốn trao đổi công việc, vui lòng để lại thông tin dưới đây.</p>
            
            <form action="#" method="get">
                <div class="form-group">
                    <label for="name">Tên của bạn:</label>
                    <input type="text" id="name" name="name" placeholder="Nhập tên của bạn">
                </div>
                
                <div class="form-group">
                    <label for="email">Email liên hệ:</label>
                    <input type="email" id="email" name="email" placeholder="ví dụ: tenban@email.com">
                </div>
                
                <div class="form-group">
                    <label for="message">Nội dung tin nhắn:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Viết thông điệp của bạn vào đây..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Gửi tin nhắn</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 [Tên Của Bạn]. Đã đăng ký bản quyền.</p>
    </footer>

</body>
</html>
