<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Tài chính - Góc Phân Tích</title>
<link rel="icon" type="image/png" href="favicon.png">
    <style>
        /* Giữ nguyên CSS dùng chung của trang web */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
        header { background-color: #1a252f; color: #ffffff; padding: 2rem 0; text-align: center; }
        header h1 { margin: 0; font-size: 2.5rem; }
        nav { margin-top: 20px; }
        nav a { color: #3498db; text-decoration: none; margin: 0 15px; font-size: 1.1rem; font-weight: bold; }
        nav a:hover { color: #ffffff; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        footer { text-align: center; padding: 20px; background-color: #1a252f; color: #ffffff; margin-top: 40px; }

        /* CSS MỚI: Dành riêng cho bảng tính toán */
        .calculator-box {
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            max-width: 500px; /* Bóp nhỏ bảng tính lại cho gọn gàng */
            margin: 0 auto;   /* Căn giữa bảng tính */
        }
        
        .calculator-box h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #34495e; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        .btn-calc {
            background-color: #2ecc71;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%; /* Nút bấm trải dài hết chiều ngang */
            transition: background-color 0.3s;
        }
        .btn-calc:hover { background-color: #27ae60; }

        /* CSS MỚI: Hộp hiển thị kết quả (mặc định sẽ ẩn đi) */
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #e8f8f5; /* Nền xanh nhạt */
            border-left: 5px solid #2ecc71; /* Viền xanh đậm bên trái */
            font-size: 1.2rem;
            display: none; /* Ẩn đi khi chưa bấm nút tính toán */
        }
        .result-box span {
            font-size: 1.5rem;
            font-weight: bold;
            color: #c0392b; /* Màu đỏ cho số tiền nổi bật */
        }
    </style>
</head>
<body>

    <header>
        <h1>Công Cụ Tài Chính</h1>
        <nav>
            <a href="index.html">Trang chủ</a>
            <a href="cong-cu.html">Công cụ</a>
            <a href="lien-he.html">Liên hệ</a>
        </nav>
    </header>

    <div class="container">
        
        <div class="calculator-box">
            <h2>Máy Tính Lãi Kép</h2>
            
            <div class="form-group">
                <label for="tien-goc">Số tiền ban đầu (VNĐ):</label>
                <input type="number" id="tien-goc" placeholder="Ví dụ: 50000000">
            </div>
            
            <div class="form-group">
                <label for="lai-suat">Lãi suất hàng năm (%):</label>
                <input type="number" id="lai-suat" placeholder="Ví dụ: 8">
            </div>
            
            <div class="form-group">
                <label for="so-nam">Số năm đầu tư (Năm):</label>
                <input type="number" id="so-nam" placeholder="Ví dụ: 10">
            </div>
            
            <button class="btn-calc" onclick="tinhLaiKep()">Tính Toán Lợi Nhuận</button>
            
            <div id="hien-thi-ket-qua" class="result-box">
                Tổng số tiền bạn nhận được là: <br>
                <span id="so-tien-tong">0</span> VNĐ
            </div>
        </div>

    </div>

    <footer>
        <p>&copy; 2026 [Tên Của Bạn]. Đã đăng ký bản quyền.</p>
    </footer>

    <script>
        function tinhLaiKep() {
            // Bước 1: Lấy các con số người dùng vừa gõ vào ô trống
            var p = document.getElementById('tien-goc').value;
            var r = document.getElementById('lai-suat').value;
            var t = document.getElementById('so-nam').value;

            // Kiểm tra xem người dùng đã nhập đủ số chưa
            if (p === "" || r === "" || t === "") {
                alert("Vui lòng nhập đầy đủ các thông tin!");
                return; // Dừng lại không tính toán tiếp
            }

            // Chuyển đổi dữ liệu chữ thành dữ liệu số thập phân để làm toán
            p = parseFloat(p);
            r = parseFloat(r) / 100; // Chia 100 vì đây là phần trăm (VD: 8% = 0.08)
            t = parseFloat(t);

            // Bước 2: Áp dụng công thức lãi kép: A = P * (1 + r)^t
            var a = p * Math.pow((1 + r), t);

            // Bước 3: Định dạng con số cho đẹp (thêm dấu chấm phân cách hàng nghìn)
            var soTienDep = a.toLocaleString('vi-VN', { maximumFractionDigits: 0 });

            // Bước 4: In kết quả ra màn hình và hiển thị hộp kết quả lên
            document.getElementById('so-tien-tong').innerText = soTienDep;
            document.getElementById('hien-thi-ket-qua').style.display = 'block';
        }
    </script>

</body>
</html>
